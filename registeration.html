        <label>Phone:</label><br>

        <label>Role:</label><br>
        <input type="text" id="role" required><br><br>

        <button type="submit">Register</button>
    </form>

    <p id="message"></p>
    <script>
        document.getElementById("registeration").addEventListener("submit",function(event){
            event.preventDefault();
            document.getElementById("message").innerText="sucessfull";
            this.reset()
        });
    </script>
</body>
